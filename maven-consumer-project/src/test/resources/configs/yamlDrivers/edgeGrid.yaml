connection:
  remoteUrl: http://localhost:4444
  enableTracing: false
  clientConfig:
    baseUrl: http://localhost:4444
    connectionTimeoutMs: 30000
    readTimeoutMs: 120000
    wsTimeoutMs: 120000
    version: HTTP_1_1
    withRetries: true

capabilities:
  browserName: MicrosoftEdge
  acceptInsecureCerts: true
  pageLoadStrategy: normal
  unhandledPromptBehavior: dismiss and notify
  strictFileInteractability: false
  timeouts:
    implicit: 0
    pageLoad: 300000
    script: 30000
  ms:edgeOptions:
    args:
      - --ignore-certificate-errors
      - --allow-insecure-localhost

postStart:
  window: maximize
  clearCookies: true
  implicitWaitMs: 0
  pageLoadTimeoutMs: 300000
  scriptTimeoutMs: 30000
  localFileDetector: true
  initialUrl: about:blank

metadata:
  profileName: edge-grid
  displayName: Edge Grid Example
  description: Example remote Edge profile for Selenium Grid.
  owner: qa
  tags:
    - grid
    - edge
    - remote
    - template

framework:
  defaultAlias: GRID_EDGE
  executionMode: remote-grid