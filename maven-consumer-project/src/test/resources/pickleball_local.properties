# Cucumber tag expression. Examples: @all, @smoke, "@smoke and not @slow"
pkb_tags=@all

# Test environment name. Values are project-defined. Examples: local, DEV, QA, UAT, PROD
#pkb_environment=QA

# Browser configuration name. Values are project-defined. Examples: chrome, chrome_headless, firefox, edge
pkb_browser=chrome

# Enable additional browser troubleshooting. Values: true, false
#pkb_debugbrowser=true

# Logging level. Values: trace, debug, info, warn, error
pkb_loglevel=info

# Maximum number of scenarios to run in parallel. Value: positive integer
pkb_parallel=10

# REPORT GENERATION
# a composite report is generated by default in the reports folder if nothing is set explicitly.

# Combined report output path and filename. Supports inserts such as <TIME>.
#pkb_compositeReport=reports/composite-report-<TIME>.html

# Individual scenario report output path and filename. Supports inserts such as <SCENARIO_NAME> and <TIME>.
#pkb_scenarioReport=reports/<SCENARIO_NAME>-<TIME>.html

