# Required for your wrapper
pkb_tags=@testjunitoutput

-Dpkb_suppressjunitfilteredskips=false


#pkb_debugArgs=logallsteps
#pkb_debugArgs=logallsteps,noBase,rawxpaths

#pkb_stepRepeatMaxTime=20
#pkb_stepRepeatMaxCount=300

pkb_HTMLreportFormat=scenarioReport,compositeReport

#pkb_compositeReport=false
pkb_compositeReport=reports/aa.html
#pkb_scenarioReport=true
pkb_scenarioReport=reports/<SCENARIO_NAME>-<TIME>.html


#pkb_HTMLcompositeReportPathTemplate=reports/aa-<TIME>.html
#pkb_HTMLcompositeReportPath=reports/cc-<TIME>.html
#pkb_HTMLscenarioReportPathTemplate=reports/xxxx<SCENARIO_NAME>-<TIME>.html
#pkb_scenarioReport=reports/zzzz<SCENARIO_NAME>-<TIME>.html

pkb_browser=chrome
pkb_debugBrowser=true
#pkb_loglevel=debug


#pkb_HTMLscenarioReportPathTemplate=zz/<SCENARIO_NAME>-<TIME>.html

#pkb_HTMLreportFormat="scenarioReport,compositeReport"
#pkb_HTMLreportFormat="scenarioreport"